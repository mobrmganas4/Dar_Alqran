<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>أكاديمية دار القرآن - الرئيسية</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary-gold: #c99a00; --dark-bg: #1a1a1a; }
    body { margin: 0; font-family: 'Cairo', sans-serif; background-color: #ffffff; color: #333; }
    
    /* القوائم - مخفية افتراضياً */
    .mobile-nav, .desktop-sidebar { display: none; }

    /* تنسيق الموبايل (شريط سفلي) */
    @media (max-width: 600px) {
        .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark-bg); height: 65px; justify-content: space-around; align-items: center; border-top: 2px solid var(--primary-gold); z-index: 1000; }
        .mobile-nav a { color: white; text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; }
        body { padding-bottom: 70px; }
    }

    /* تنسيق الكمبيوتر (شريط جانبي شمال) */
    @media (min-width: 601px) {
        .desktop-sidebar { display: block; position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: var(--dark-bg); border-right: 4px solid var(--primary-gold); padding-top: 40px; z-index: 1000; }
        .desktop-sidebar a { display: block; color: white; padding: 15px 25px; text-decoration: none; border-bottom: 1px solid #333; text-align: right; }
        .desktop-sidebar a:hover { background: var(--primary-gold); color: black; }
        body { margin-left: 220px; }
    }

    .main-content { text-align: center; padding: 80px 20px; }
    h1 { color: var(--primary-gold); font-size: 40px; font-weight: 900; }
  </style>
</head>
<body>

  <nav class="mobile-nav">
    <a href="index.html">🏠<span>الرئيسية</span></a>
    <a href="Join.html">🎯<span>الاشتراك</span></a>
    <a href="about.html">📖<span>من نحن</span></a>
    <a href="contact.html">📞<span>تواصل</span></a>
  </nav>

  <nav class="desktop-sidebar">
    <div style="text-align: center; margin-bottom: 20px;"><img src="logo512.png" width="70"></div>
    <a href="index.html">الصفحة الرئيسية</a>
    <a href="Join.html">باقات الاشتراك</a>
    <a href="about.html">عن الأكاديمية</a>
    <a href="contact.html">تواصل معنا</a>
  </nav>

  <main class="main-content">
    <img src="logo512.png" width="120">
    <h1>مرحبا بكم في دار القرآن</h1>
    <p style="font-size: 20px; color: #666;">تعلم أصول دينك وفقهه بأسلوب ميسر</p>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
    }
  </script>
</body>
</html>
