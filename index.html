<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أكاديمية دار القرآن - الرئيسية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-gold: #c99a00; --dark-bg: #1a1a1a; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: #fafafa; color: #333; overflow-x: hidden; }
        
        /* زرار التثبيت العلوي */
        #install-banner {
            display: none; position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: var(--dark-bg); color: white; padding: 12px 20px; border-radius: 50px;
            border: 2px solid var(--primary-gold); z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            width: 85%; max-width: 400px; text-align: center; font-weight: bold; cursor: pointer;
        }

        /* القوائم الذكية */
        .mobile-nav, .desktop-sidebar { display: none; }
        @media (max-width: 600px) {
            .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark-bg); height: 65px; justify-content: space-around; align-items: center; border-top: 2px solid var(--primary-gold); z-index: 1000; }
            .mobile-nav a { color: white; text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; }
            body { padding-bottom: 70px; }
        }
        @media (min-width: 601px) {
            .desktop-sidebar { display: block; position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: var(--dark-bg); border-right: 4px solid var(--primary-gold); padding-top: 40px; z-index: 1000; }
            .desktop-sidebar a { display: block; color: white; padding: 15px 25px; text-decoration: none; border-bottom: 1px solid #333; text-align: right; }
            body { margin-left: 240px; }
        }

        /* واجهة الصفحة (Hero) */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1584281723351-931f6d3f00e5?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            height: 450px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px;
        }
        .hero img { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--primary-gold)); }
        .btn-main { background: var(--primary-gold); color: black; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 900; }
    </style>
</head>
<body>

    <div id="install-banner">📲 اضغط هنا لتثبيت التطبيق على موبايلك</div>

    <nav class="mobile-nav">
        <a href="index.html" style="color: var(--primary-gold);">🏠<span>الرئيسية</span></a>
        <a href="Join.html">🎯<span>الاشتراك</span></a>
        <a href="about.html">📖<span>من نحن</span></a>
        <a href="contact.html">📞<span>تواصل</span></a>
    </nav>

    <nav class="desktop-sidebar">
        <div style="text-align: center; margin-bottom: 20px;"><img src="logo512.png" width="80"></div>
        <a href="index.html" style="background: var(--primary-gold); color: black;">الصفحة الرئيسية</a>
        <a href="Join.html">باقات الاشتراك</a>
        <a href="about.html">عن الأكاديمية</a>
        <a href="contact.html">تواصل معنا</a>
    </nav>

    <section class="hero">
        <img src="logo512.png" alt="Logo">
        <h1>أكاديمية دار القرآن</h1>
        <p>تعلم أصول دينك وفقهه بأسلوب ميسر</p>
        <a href="Join.html" class="btn-main">ابدأ الآن</a>
    </section>

    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');

        // التقاط حدث التثبيت
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'block'; // اظهر الزرار فوراً
        });

        installBanner.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') { installBanner.style.display = 'none'; }
                deferredPrompt = null;
            }
        });

        // تسجيل السيرفس وركر
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW Registered!');
                }).catch(err => console.log('SW Error:', err));
            });
        }
    </script>
</body>
</html>
