<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta charset="UTF-8">
    <title>باقات الاشتراك - دار القرآن</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-gold: #c99a00; --dark-bg: #1a1a1a; --offer-red: #e74c3c; }
        body { font-family: 'Cairo', sans-serif; background-color: #f4f4f4; margin: 0; text-align: center; color: #333; }
        
        /* القوائم الموحدة */
        .mobile-nav, .desktop-sidebar { display: none; }
        @media (max-width: 600px) {
            .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark-bg); height: 65px; justify-content: space-around; align-items: center; border-top: 2px solid var(--primary-gold); z-index: 1000; }
            .mobile-nav a { color: white; text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; }
            body { padding-bottom: 80px; }
        }
        @media (min-width: 601px) {
            .desktop-sidebar { display: block; position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: var(--dark-bg); border-right: 4px solid var(--primary-gold); padding-top: 40px; z-index: 1000; }
            .desktop-sidebar a { display: block; color: white; padding: 15px 25px; text-decoration: none; border-bottom: 1px solid #333; text-align: right; }
            body { margin-left: 240px; }
        }

        .pricing-card {
            background: white; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px; margin: 40px auto; overflow: hidden;
        }
        .card-header { background: var(--dark-bg); color: var(--primary-gold); padding: 25px; font-weight: 900; font-size: 22px; }
        .price-section { padding: 30px; }
        .old-price { text-decoration: line-through; color: #999; font-size: 22px; display: block; }
        .current-price { color: var(--offer-red); font-size: 55px; font-weight: 900; margin: 10px 0; }
        
        .timer-box { background: #fff0f0; color: #c0392b; padding: 15px; margin: 10px 25px; border-radius: 15px; font-weight: bold; border: 1px dashed #e74c3c; }

        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 18px; border-radius: 50px; margin: 15px 25px; text-decoration: none; font-weight: 900; font-size: 18px; transition: 0.3s; }
        .btn-cash { background: var(--offer-red); color: white; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); }
        .btn-confirm { background: #0088cc; color: white; box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3); }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
    </style>
</head>
<body>

    <nav class="mobile-nav">
        <a href="index.html">🏠<span>الرئيسية</span></a>
        <a href="Join.html" style="color: var(--primary-gold);">🎯<span>الاشتراك</span></a>
        <a href="about.html">📖<span>من نحن</span></a>
        <a href="contact.html">📞<span>تواصل</span></a>
    </nav>

    <div class="pricing-card">
        <div class="card-header">اشتراك شهر مارس 🌙</div>
        <div class="price-section">
            <span id="old-price" class="old-price">السعر الأصلي: 150 جنيه</span>
            <div id="price-val" class="current-price">100 جنيه</div>
            <p style="color: #666;">عرض خاص من 6 مارس إلى 14 مارس</p>
        </div>

        <div id="timer-text" class="timer-box">🔥 العرض ساري الآن!</div>

        <div style="padding-bottom: 30px;">
            <a href="tel:*9*7*01006971652*100%23" class="btn btn-cash">
                💳 اضغط لتحويل 100ج كاش
            </a>
            <a href="https://t.me/+201144546621" class="btn btn-confirm">
                📱 أرسل الإيصال لتفعيل حسابك
            </a>
        </div>
    </div>

    <script>
        function updateOffer() {
            const now = new Date();
            const start = new Date("March 6, 2026 00:00:00");
            const end = new Date("March 14, 2026 23:59:59");
            
            const priceVal = document.getElementById('price-val');
            const oldPrice = document.getElementById('old-price');
            const timerText = document.getElementById('timer-text');

            if (now >= start && now <= end) {
                // وقت العرض
                priceVal.innerText = "100 جنيه";
                oldPrice.style.display = "block";
                timerText.innerText = "🔥 العرض ينتهي يوم 14 مارس!";
            } else {
                // خارج وقت العرض
                priceVal.innerText = "150 جنيه";
                oldPrice.style.display = "none";
                timerText.innerText = "انتظروا عروضنا القادمة قريباً";
                timerText.style.background = "#eee";
                timerText.style.color = "#777";
                timerText.style.borderColor = "#ccc";
            }
        }
        updateOffer();
    </script>
</body>
</html>
