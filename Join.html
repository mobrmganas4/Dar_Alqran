<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الاشتراك - دار القرآن</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo512.png">

<link rel="apple-touch-icon" href="logo512.png">

<link rel="manifest" href="manifest.json">

    <style>
        :root { --primary-gold: #c99a00; --dark-bg: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background-color: #fffdf5; margin: 0; padding: 20px; text-align: center; }
        .card { background: #fff; padding: 30px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); max-width: 500px; margin: 20px auto; }
        .btn { display: block; padding: 16px; border-radius: 50px; margin-top: 15px; font-weight: bold; text-decoration: none; }
        .btn-ussd { background: #d9534f; color: white; }
        .btn-telegram { background: #0088cc; color: white; }
        #timer-text { background: #fff3f3; padding: 10px; border-radius: 10px; margin-top: 15px; display: inline-block; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <h2 style="color: var(--primary-gold);">باقات الاشتراك والعروض</h2>
    <div class="card">
        <h3>دورة الفقه الشهريه </h3>
        <div style="margin: 20px 0;">
            <span id="old-price" style="text-decoration: line-through; color: #888; font-size: 20px; display: none;">150 جنيه</span>
            <span id="current-price" style="font-size: 40px; font-weight: 900; color: #d9534f; margin-right: 10px;">150 جنيه</span>
        </div>
        
        <div id="timer-text">⏳ جاري التحقق من حالة العرض...</div>

        <a href="tel:*9*7*01124313665*100%23" class="btn btn-ussd">اضغط لتحويل الاشتراك (كاش)</a>
        <a href="https://t.me/+201124313665" class="btn btn-telegram">إرسال الإيصال لتفعيل الحساب</a>
        <br>
        <a href="index.html" style="color: var(--primary-gold); text-decoration: none; font-weight: bold;">← العودة للرئيسية</a>
    </div>

    <script>
        function updateOffer() {
            // التعديل: العرض يبدأ 1 مارس 2026
            const startDate = new Date("March 1, 2026 00:00:00");
            const durationDays = 12;
            const endDate = new Date(startDate.getTime() + (durationDays * 24 * 60 * 60 * 1000));
            const now = new Date();

            const timerElement = document.getElementById('timer-text');
            const currentPrice = document.getElementById('current-price');
            const oldPrice = document.getElementById('old-price');

            if (now < startDate) {
                timerElement.innerHTML = "⏳ العرض الخاص يبدأ يوم 1 مارس!";
                currentPrice.innerText = "150 جنيه";
                oldPrice.style.display = "none";
            } else if (now >= startDate && now <= endDate) {
                const diff = endDate - now;
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                timerElement.innerHTML = "🔥 متبقي " + days + " يوم على انتهاء خصم الأكاديمية!";
                currentPrice.innerText = "100 جنيه";
                oldPrice.style.display = "inline";
            } else {
                timerElement.innerHTML = "⚠️ انتهى عرض الخصم الحالي";
                currentPrice.innerText = "150 جنيه";
                oldPrice.style.display = "none";
            }
        }
        window.onload = updateOffer;
    </script>
</body>
</html>
